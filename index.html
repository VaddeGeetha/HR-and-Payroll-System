<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>HR Connect</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Main Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ========== LOGIN PAGE ========== -->
<div id="loginPage" class="login-page">
  <div class="login-header">
    <div class="company-logo">
      <i class="fas fa-building"></i>
      <span>HR Connect</span>
    </div>
    <div class="login-title">Welcome Back</div>
    <div class="login-sub">Sign in to your employee portal</div>
  </div>

  <div class="input-group">
    <label for="emailInput"><i class="far fa-envelope" style="margin-right: 6px; color:#1a6dff;"></i> Email</label>
    <input type="email" id="emailInput" placeholder="alex.employee@gmail.com" value="alex.employee@gmail.com" />
  </div>
  <div class="input-group">
    <label for="passwordInput"><i class="fas fa-lock" style="margin-right: 6px; color:#1a6dff;"></i> Password</label>
    <div class="password-wrapper">
      <input type="password" id="passwordInput" placeholder="••••••••" value="password123" />
      <button class="password-toggle" onclick="togglePassword()"><i class="fas fa-eye"></i></button>
    </div>
  </div>

  <button class="login-btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket" style="margin-right: 8px;"></i> Sign In</button>

  <div class="login-actions">
    <a href="#"><i class="far fa-circle-question"></i> Forgot password?</a>
  </div>
</div>

<!-- ========== DASHBOARD ========== -->
<div id="dashboardContainer" class="dashboard-container">
  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><i class="fas fa-building"></i> HR Connect</div>
      <ul class="sidebar-nav" id="sidebarNav"></ul>
      <div class="sidebar-footer">
        <button id="signOutSidebar"><i class="fas fa-right-from-bracket"></i> Sign out</button>
      </div>
    </aside>
    <!-- MAIN CONTENT -->
    <main class="main-content">
      <nav class="top-nav">
        <div style="display:flex;align-items:center;gap:1rem;">
          <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
          <span class="welcome-text">Hi, <strong id="employeeNameDisplay">User</strong></span>
          <span class="role-badge" id="roleBadge">Employee</span>
        </div>
        <div class="profile-icon" id="profileIcon"><i class="fas fa-user-circle"></i> Profile</div>
      </nav>
      <div class="content-sections" id="contentSections"></div>
    </main>
  </div>
</div>

<!-- JavaScript Files -->
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/wfh.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/renderers.js"></script>
<script src="js/app.js"></script>
<script src="js/main.js"></script>
</body>
</html>
